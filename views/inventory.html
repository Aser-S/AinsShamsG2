<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory — Sales & Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-60 bg-slate-800 min-h-screen flex-shrink-0 hidden md:block" id="sidebar"></aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">Inventory</h1>
      <button id="addProductBtn" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg">
        + Add Product
      </button>
    </header>

    <main class="flex-1 p-6 space-y-4">
      <!-- Filters -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-wrap gap-3">
        <input id="searchInput" type="text" placeholder="Search product or SKU…"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 flex-1 min-w-40" />
        <select id="branchFilter"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="">All Branches</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
          <input type="checkbox" id="lowStockOnly" class="rounded" /> Low stock only
        </label>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-wrap">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">Product</th>
              <th class="px-4 py-3 text-left">SKU</th>
              <th class="px-4 py-3 text-left">Category</th>
              <th class="px-4 py-3 text-left">Branch</th>
              <th class="px-4 py-3 text-right">Qty</th>
              <th class="px-4 py-3 text-right">Reorder</th>
              <th class="px-4 py-3 text-right">Unit Price</th>
              <th class="px-4 py-3 text-center">Status</th>
            </tr>
          </thead>
          <tbody id="inventoryBody" class="divide-y divide-slate-100">
            <tr><td colspan="8" class="px-4 py-6 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add Product Modal (ADMIN only) -->
  <div id="productModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-slate-800" id="modalTitle">Add Product</h3>
        <button id="closeModal" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
      </div>
      <form id="productForm" class="space-y-4">
        <input type="hidden" id="editProductId" />
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Category</label>
            <select id="pCategoryId" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">SKU</label>
            <input id="pSku" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Product Name</label>
          <input id="pName" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Unit Price</label>
            <input id="pPrice" type="number" min="0" step="0.01" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Unit</label>
            <input id="pUom" type="text" placeholder="pcs" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Reorder Level</label>
            <input id="pReorder" type="number" min="0" value="10" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
        </div>
        <div id="formError" class="hidden text-xs text-red-600 bg-red-50 rounded p-2"></div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelModal" class="flex-1 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
          <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-semibold">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let allInventory = [];
    let categories   = [];

    async function init() {
      await initLayout();
      const [inv, cats, branches] = await Promise.all([
        API.get('/api/inventory'),
        API.get('/api/products/categories'),
        API.get('/api/users/branches'),
      ]);
      allInventory = inv;
      categories   = cats;

      // Branch filter options
      const bSel = document.getElementById('branchFilter');
      const seen = {};
      inv.forEach(i => {
        if (!seen[i.branch_id]) {
          seen[i.branch_id] = true;
          const opt = document.createElement('option');
          opt.value = i.branch_id;
          opt.textContent = i.branch_name;
          bSel.appendChild(opt);
        }
      });

      // Populate category select in modal
      const catSel = document.getElementById('pCategoryId');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        catSel.appendChild(opt);
      });

      // Show add product button for ADMIN
      if (currentUser.role === 'ADMIN') {
        document.getElementById('addProductBtn').classList.remove('hidden');
      }

      renderTable();

      document.getElementById('searchInput').addEventListener('input', renderTable);
      document.getElementById('branchFilter').addEventListener('change', renderTable);
      document.getElementById('lowStockOnly').addEventListener('change', renderTable);

      document.getElementById('addProductBtn').addEventListener('click', () => openModal());
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('cancelModal').addEventListener('click', closeModal);
      document.getElementById('productForm').addEventListener('submit', saveProduct);
    }

    function renderTable() {
      const search    = document.getElementById('searchInput').value.toLowerCase();
      const branchId  = document.getElementById('branchFilter').value;
      const lowOnly   = document.getElementById('lowStockOnly').checked;

      const filtered = allInventory.filter(i =>
        (!search   || i.product_name.toLowerCase().includes(search) || i.sku.toLowerCase().includes(search)) &&
        (!branchId || i.branch_id == branchId) &&
        (!lowOnly  || i.quantity <= i.reorder_level)
      );

      const body = document.getElementById('inventoryBody');
      if (filtered.length === 0) {
        body.innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-slate-400">No results found.</td></tr>';
        return;
      }

      body.innerHTML = filtered.map(i => {
        const isLow = i.quantity <= i.reorder_level;
        return `
          <tr class="hover:bg-slate-50">
            <td class="px-4 py-3 font-medium text-slate-700">${i.product_name}</td>
            <td class="px-4 py-3 text-slate-500 font-mono text-xs">${i.sku}</td>
            <td class="px-4 py-3 text-slate-500">${i.category_name}</td>
            <td class="px-4 py-3 text-slate-500">${i.branch_name}</td>
            <td class="px-4 py-3 text-right font-semibold ${isLow ? 'text-red-600' : 'text-slate-700'}">${i.quantity}</td>
            <td class="px-4 py-3 text-right text-slate-500">${i.reorder_level}</td>
            <td class="px-4 py-3 text-right text-slate-700">${fmt(i.unit_price)}</td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-1 rounded-full text-xs font-medium ${isLow ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">
                ${isLow ? '⚠ Low' : '✓ OK'}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openModal(product) {
      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('formError').classList.add('hidden');
      if (product) {
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('editProductId').value = product.id;
        document.getElementById('pCategoryId').value   = product.category_id;
        document.getElementById('pSku').value          = product.sku;
        document.getElementById('pName').value         = product.name;
        document.getElementById('pPrice').value        = product.unit_price;
        document.getElementById('pUom').value          = product.unit_of_measure;
        document.getElementById('pReorder').value      = product.reorder_level;
      } else {
        document.getElementById('modalTitle').textContent = 'Add Product';
        document.getElementById('productForm').reset();
        document.getElementById('editProductId').value = '';
      }
    }

    function closeModal() {
      document.getElementById('productModal').classList.add('hidden');
    }

    async function saveProduct(e) {
      e.preventDefault();
      const id = document.getElementById('editProductId').value;
      const payload = {
        category_id:     parseInt(document.getElementById('pCategoryId').value),
        sku:             document.getElementById('pSku').value.trim(),
        name:            document.getElementById('pName').value.trim(),
        unit_price:      parseFloat(document.getElementById('pPrice').value),
        unit_of_measure: document.getElementById('pUom').value.trim(),
        reorder_level:   parseInt(document.getElementById('pReorder').value),
      };

      try {
        if (id) {
          await API.put(`/api/products/${id}`, payload);
        } else {
          await API.post('/api/products', payload);
        }
        showToast('Product saved!');
        closeModal();
        // Reload inventory
        allInventory = await API.get('/api/inventory');
        renderTable();
      } catch (err) {
        const errEl = document.getElementById('formError');
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    init();
  </script>
</body>
</html>

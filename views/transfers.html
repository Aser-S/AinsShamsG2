<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Transfers — Sales & Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-60 bg-slate-800 min-h-screen flex-shrink-0 hidden md:block" id="sidebar"></aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">Stock Transfers</h1>
      <button id="newTransferBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg">
        + New Transfer
      </button>
    </header>

    <main class="flex-1 p-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-wrap">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">From</th>
              <th class="px-4 py-3 text-left">To</th>
              <th class="px-4 py-3 text-left">Initiated By</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-left">Date</th>
              <th class="px-4 py-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="transferBody">
            <tr><td colspan="7" class="px-4 py-6 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- New Transfer Modal -->
  <div id="transferModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 max-h-screen overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-slate-800">New Stock Transfer</h3>
        <button id="closeTransfer" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
      </div>

      <form id="transferForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">From Branch</label>
            <select id="fromBranch" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">To Branch</label>
            <select id="toBranch" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium text-slate-600">Items</label>
            <button type="button" id="addItemRow" class="text-xs text-emerald-600 hover:underline">+ Add item</button>
          </div>
          <div id="transferItems" class="space-y-2"></div>
        </div>

        <div id="transferError" class="hidden text-xs text-red-600 bg-red-50 rounded p-2"></div>

        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelTransfer" class="flex-1 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
          <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-semibold">Dispatch</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let branches = [];
    let products = [];

    async function init() {
      await initLayout();
      const [br, pr, transfers] = await Promise.all([
        API.get('/api/users/branches'),
        API.get('/api/products'),
        API.get('/api/transfers'),
      ]);
      branches = br;
      products = pr;

      // Populate branch selects
      ['fromBranch', 'toBranch'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">Select…</option>';
        branches.forEach(b => {
          const opt = document.createElement('option');
          opt.value = b.id;
          opt.textContent = b.name;
          sel.appendChild(opt);
        });
      });

      renderTransfers(transfers);
      addItemRow(); // default one row

      document.getElementById('newTransferBtn').addEventListener('click', () => {
        document.getElementById('transferModal').classList.remove('hidden');
      });
      document.getElementById('closeTransfer').addEventListener('click', closeModal);
      document.getElementById('cancelTransfer').addEventListener('click', closeModal);
      document.getElementById('addItemRow').addEventListener('click', addItemRow);
      document.getElementById('transferForm').addEventListener('submit', submitTransfer);
    }

    function renderTransfers(transfers) {
      const body = document.getElementById('transferBody');
      if (transfers.length === 0) {
        body.innerHTML = '<tr><td colspan="7" class="px-4 py-6 text-center text-slate-400">No transfers found.</td></tr>';
        return;
      }

      const statusColors = {
        IN_TRANSIT: 'bg-blue-100 text-blue-700',
        COMPLETED:  'bg-green-100 text-green-700',
        CANCELLED:  'bg-red-100 text-red-700',
        PENDING:    'bg-yellow-100 text-yellow-700',
      };

      body.innerHTML = transfers.map(t => `
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-500 font-mono text-xs">#${t.id}</td>
          <td class="px-4 py-3 font-medium text-slate-700">${t.from_branch_name}</td>
          <td class="px-4 py-3 text-slate-700">${t.to_branch_name}</td>
          <td class="px-4 py-3 text-slate-500">${t.initiated_by_name}</td>
          <td class="px-4 py-3 text-center">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusColors[t.status] || ''}">
              ${t.status}
            </span>
          </td>
          <td class="px-4 py-3 text-slate-500 text-xs">${fmtDate(t.created_at)}</td>
          <td class="px-4 py-3 text-center">
            ${t.status === 'IN_TRANSIT' ? `
              <button onclick="updateStatus(${t.id}, 'COMPLETED')"
                class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded mr-1">Receive</button>
              <button onclick="updateStatus(${t.id}, 'CANCELLED')"
                class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded">Cancel</button>
            ` : '—'}
          </td>
        </tr>
      `).join('');
    }

    function addItemRow() {
      const container = document.getElementById('transferItems');
      const row = document.createElement('div');
      row.className = 'flex gap-2 items-center';
      row.innerHTML = `
        <select class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 transfer-product">
          <option value="">Select product…</option>
          ${products.map(p => `<option value="${p.id}">${p.name} (${p.sku})</option>`).join('')}
        </select>
        <input type="number" min="1" value="1" placeholder="Qty"
          class="w-20 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 transfer-qty" />
        <button type="button" onclick="this.parentElement.remove()"
          class="text-slate-400 hover:text-red-500 text-lg leading-none">×</button>
      `;
      container.appendChild(row);
    }

    function closeModal() {
      document.getElementById('transferModal').classList.add('hidden');
      document.getElementById('transferError').classList.add('hidden');
    }

    async function submitTransfer(e) {
      e.preventDefault();
      const fromBranch = parseInt(document.getElementById('fromBranch').value);
      const toBranch   = parseInt(document.getElementById('toBranch').value);

      const rows = document.getElementById('transferItems').querySelectorAll('.flex');
      const items = [];
      rows.forEach(row => {
        const pid = parseInt(row.querySelector('.transfer-product').value);
        const qty = parseInt(row.querySelector('.transfer-qty').value);
        if (pid && qty > 0) items.push({ product_id: pid, quantity: qty });
      });

      const errEl = document.getElementById('transferError');

      if (!fromBranch || !toBranch) {
        errEl.textContent = 'Please select both branches.';
        errEl.classList.remove('hidden');
        return;
      }
      if (items.length === 0) {
        errEl.textContent = 'Add at least one item.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await API.post('/api/transfers', { from_branch_id: fromBranch, to_branch_id: toBranch, items });
        showToast('Transfer dispatched!');
        closeModal();
        const transfers = await API.get('/api/transfers');
        renderTransfers(transfers);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function updateStatus(id, status) {
      try {
        await API.patch(`/api/transfers/${id}/status`, { status });
        showToast(`Transfer ${status.toLowerCase()}.`);
        const transfers = await API.get('/api/transfers');
        renderTransfers(transfers);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    init();
  </script>
</body>
</html>

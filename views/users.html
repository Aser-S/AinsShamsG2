<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Sales & Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-60 bg-slate-800 min-h-screen flex-shrink-0 hidden md:block" id="sidebar"></aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">User Management</h1>
      <button id="newUserBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg">
        + New User
      </button>
    </header>

    <main class="flex-1 p-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-wrap">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">Name</th>
              <th class="px-4 py-3 text-left">Username</th>
              <th class="px-4 py-3 text-left">Role</th>
              <th class="px-4 py-3 text-left">Branch</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="6" class="px-4 py-6 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- User Modal -->
  <div id="userModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-slate-800" id="userModalTitle">New User</h3>
        <button id="closeUserModal" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
      </div>

      <form id="userForm" class="space-y-4">
        <input type="hidden" id="editUserId" />
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Full Name</label>
          <input id="uName" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Username</label>
            <input id="uUsername" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Password <span id="pwdHint" class="text-slate-400 font-normal">(min 6 chars)</span></label>
            <input id="uPassword" type="password" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Role</label>
            <select id="uRole" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
              <option value="CASHIER">CASHIER</option>
              <option value="MANAGER">MANAGER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Branch</label>
            <select id="uBranch" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
              <option value="">None (System-wide)</option>
            </select>
          </div>
        </div>
        <div id="uActiveRow" class="hidden">
          <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
            <input type="checkbox" id="uIsActive" class="rounded" checked />
            Account is active
          </label>
        </div>
        <div id="userError" class="hidden text-xs text-red-600 bg-red-50 rounded p-2"></div>
        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelUserModal" class="flex-1 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
          <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-semibold">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let branches = [];

    async function init() {
      await initLayout();

      branches = await API.get('/api/users/branches');

      // Populate branch select
      const brSel = document.getElementById('uBranch');
      branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = b.name;
        brSel.appendChild(opt);
      });

      await loadUsers();

      document.getElementById('newUserBtn').addEventListener('click', () => openUserModal());
      document.getElementById('closeUserModal').addEventListener('click', closeUserModal);
      document.getElementById('cancelUserModal').addEventListener('click', closeUserModal);
      document.getElementById('userForm').addEventListener('submit', saveUser);
    }

    async function loadUsers() {
      const users = await API.get('/api/users');
      renderUsers(users);
    }

    const roleColors = {
      ADMIN:   'bg-purple-100 text-purple-700',
      MANAGER: 'bg-blue-100 text-blue-700',
      CASHIER: 'bg-slate-100 text-slate-700',
    };

    function renderUsers(users) {
      const body = document.getElementById('usersBody');
      if (users.length === 0) {
        body.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-center text-slate-400">No users found.</td></tr>';
        return;
      }
      body.innerHTML = users.map(u => `
        <tr class="hover:bg-slate-50 border-t border-slate-100">
          <td class="px-4 py-3 font-medium text-slate-700">${u.name}</td>
          <td class="px-4 py-3 font-mono text-xs text-slate-600">${u.username}</td>
          <td class="px-4 py-3">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${roleColors[u.role] || ''}">${u.role}</span>
          </td>
          <td class="px-4 py-3 text-slate-500">${u.branch_name || '—'}</td>
          <td class="px-4 py-3 text-center">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">
              ${u.is_active ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td class="px-4 py-3 text-center">
            <button onclick="openUserModal(${JSON.stringify(u).replace(/"/g, '&quot;')})"
              class="text-xs text-emerald-600 hover:underline">Edit</button>
          </td>
        </tr>
      `).join('');
    }

    function openUserModal(user) {
      const modal = document.getElementById('userModal');
      const errEl = document.getElementById('userError');
      errEl.classList.add('hidden');
      modal.classList.remove('hidden');

      if (user) {
        document.getElementById('userModalTitle').textContent = 'Edit User';
        document.getElementById('editUserId').value   = user.id;
        document.getElementById('uName').value        = user.name;
        document.getElementById('uUsername').value    = user.username;
        document.getElementById('uPassword').value    = '';
        document.getElementById('uRole').value        = user.role;
        document.getElementById('uBranch').value      = user.branch_id || '';
        document.getElementById('uIsActive').checked  = !!user.is_active;
        document.getElementById('uActiveRow').classList.remove('hidden');
        document.getElementById('pwdHint').textContent = '(leave blank to keep)';
      } else {
        document.getElementById('userModalTitle').textContent = 'New User';
        document.getElementById('editUserId').value = '';
        document.getElementById('userForm').reset();
        document.getElementById('uActiveRow').classList.add('hidden');
        document.getElementById('pwdHint').textContent = '(min 6 chars)';
      }
    }

    function closeUserModal() {
      document.getElementById('userModal').classList.add('hidden');
    }

    async function saveUser(e) {
      e.preventDefault();
      const id       = document.getElementById('editUserId').value;
      const errEl    = document.getElementById('userError');
      errEl.classList.add('hidden');

      const payload = {
        name:      document.getElementById('uName').value.trim(),
        username:  document.getElementById('uUsername').value.trim(),
        role:      document.getElementById('uRole').value,
        branch_id: document.getElementById('uBranch').value || null,
      };
      const pwd = document.getElementById('uPassword').value;
      if (pwd) payload.password = pwd;
      if (id)  payload.is_active = document.getElementById('uIsActive').checked ? 1 : 0;

      try {
        if (id) {
          await API.patch(`/api/users/${id}`, payload);
        } else {
          if (!pwd) {
            errEl.textContent = 'Password is required for new users.';
            errEl.classList.remove('hidden');
            return;
          }
          await API.post('/api/users', payload);
        }
        showToast('User saved!');
        closeUserModal();
        await loadUsers();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    init();
  </script>
</body>
</html>

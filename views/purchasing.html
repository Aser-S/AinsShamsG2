<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchasing — Sales & Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-60 bg-slate-800 min-h-screen flex-shrink-0 hidden md:block" id="sidebar"></aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-slate-800">Purchase Orders</h1>
      <button id="newPoBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg">
        + New PO
      </button>
    </header>

    <main class="flex-1 p-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-wrap">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">Supplier</th>
              <th class="px-4 py-3 text-left">Branch</th>
              <th class="px-4 py-3 text-left">Created By</th>
              <th class="px-4 py-3 text-right">Total</th>
              <th class="px-4 py-3 text-center">Status</th>
              <th class="px-4 py-3 text-left">Date</th>
              <th class="px-4 py-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="poBody">
            <tr><td colspan="8" class="px-4 py-6 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- New PO Modal -->
  <div id="poModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 max-h-screen overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-slate-800">New Purchase Order</h3>
        <button id="closePoModal" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
      </div>

      <form id="poForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Supplier</label>
            <select id="poSupplier" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Destination Branch</label>
            <select id="poBranch" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-medium text-slate-600">Line Items</label>
            <button type="button" id="addPoItem" class="text-xs text-emerald-600 hover:underline">+ Add item</button>
          </div>
          <div id="poItems" class="space-y-2"></div>
        </div>

        <div class="text-right text-sm font-semibold text-slate-700">
          Total: <span id="poTotal">$0.00</span>
        </div>

        <div id="poError" class="hidden text-xs text-red-600 bg-red-50 rounded p-2"></div>

        <div class="flex gap-3 pt-2">
          <button type="button" id="cancelPo" class="flex-1 border border-slate-300 text-slate-700 py-2 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
          <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-sm font-semibold">Place Order</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let suppliers = [];
    let branches  = [];
    let products  = [];

    async function init() {
      await initLayout();

      const [sup, br, pr, orders] = await Promise.all([
        API.get('/api/suppliers'),
        API.get('/api/users/branches'),
        API.get('/api/products'),
        API.get('/api/purchase-orders'),
      ]);
      suppliers = sup;
      branches  = br;
      products  = pr;

      // Populate selects
      const supSel = document.getElementById('poSupplier');
      supSel.innerHTML = '<option value="">Select supplier…</option>';
      suppliers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.company_name;
        supSel.appendChild(opt);
      });

      const brSel = document.getElementById('poBranch');
      brSel.innerHTML = '<option value="">Select branch…</option>';
      branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = b.name;
        // Pre-select manager's branch
        if (currentUser.branch_id && currentUser.branch_id === b.id) opt.selected = true;
        brSel.appendChild(opt);
      });

      renderOrders(orders);
      addPoItem();

      document.getElementById('newPoBtn').addEventListener('click', () => {
        document.getElementById('poModal').classList.remove('hidden');
      });
      document.getElementById('closePoModal').addEventListener('click', closePoModal);
      document.getElementById('cancelPo').addEventListener('click', closePoModal);
      document.getElementById('addPoItem').addEventListener('click', addPoItem);
      document.getElementById('poForm').addEventListener('submit', submitPo);
    }

    function renderOrders(orders) {
      const body = document.getElementById('poBody');
      if (orders.length === 0) {
        body.innerHTML = '<tr><td colspan="8" class="px-4 py-6 text-center text-slate-400">No purchase orders found.</td></tr>';
        return;
      }

      const statusColors = {
        ORDERED:   'bg-blue-100 text-blue-700',
        RECEIVED:  'bg-green-100 text-green-700',
        CANCELLED: 'bg-red-100 text-red-700',
        DRAFT:     'bg-slate-100 text-slate-600',
      };

      body.innerHTML = orders.map(o => `
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-500 font-mono text-xs">#${o.id}</td>
          <td class="px-4 py-3 font-medium text-slate-700">${o.supplier_name}</td>
          <td class="px-4 py-3 text-slate-500">${o.branch_name}</td>
          <td class="px-4 py-3 text-slate-500">${o.created_by_name}</td>
          <td class="px-4 py-3 text-right font-semibold text-slate-700">${fmt(o.total_amount)}</td>
          <td class="px-4 py-3 text-center">
            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusColors[o.status] || ''}">
              ${o.status}
            </span>
          </td>
          <td class="px-4 py-3 text-slate-500 text-xs">${fmtDate(o.created_at)}</td>
          <td class="px-4 py-3 text-center">
            ${o.status === 'ORDERED' ? `
              <button onclick="receivePo(${o.id})"
                class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded">Mark Received</button>
            ` : '—'}
          </td>
        </tr>
      `).join('');
    }

    function addPoItem() {
      const container = document.getElementById('poItems');
      const row = document.createElement('div');
      row.className = 'flex gap-2 items-center';
      row.innerHTML = `
        <select class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 po-product">
          <option value="">Select product…</option>
          ${products.map(p => `<option value="${p.id}" data-price="${p.unit_price}">${p.name} (${p.sku})</option>`).join('')}
        </select>
        <input type="number" min="1" value="1" placeholder="Qty"
          class="w-20 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 po-qty" />
        <input type="number" min="0" step="0.01" placeholder="Cost"
          class="w-24 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 po-cost" />
        <button type="button" onclick="this.parentElement.remove(); recalcTotal();"
          class="text-slate-400 hover:text-red-500 text-lg leading-none">×</button>
      `;
      // Auto-fill cost from product price
      row.querySelector('.po-product').addEventListener('change', function() {
        const price = this.options[this.selectedIndex]?.dataset.price;
        if (price) row.querySelector('.po-cost').value = parseFloat(price).toFixed(2);
        recalcTotal();
      });
      row.querySelector('.po-qty').addEventListener('input', recalcTotal);
      row.querySelector('.po-cost').addEventListener('input', recalcTotal);
      container.appendChild(row);
    }

    function recalcTotal() {
      let total = 0;
      document.querySelectorAll('#poItems .flex').forEach(row => {
        const qty  = parseFloat(row.querySelector('.po-qty')?.value) || 0;
        const cost = parseFloat(row.querySelector('.po-cost')?.value) || 0;
        total += qty * cost;
      });
      document.getElementById('poTotal').textContent = fmt(total);
    }

    function closePoModal() {
      document.getElementById('poModal').classList.add('hidden');
      document.getElementById('poError').classList.add('hidden');
    }

    async function submitPo(e) {
      e.preventDefault();
      const supplier_id = parseInt(document.getElementById('poSupplier').value);
      const branch_id   = parseInt(document.getElementById('poBranch').value);
      const rows = document.getElementById('poItems').querySelectorAll('.flex');
      const items = [];
      rows.forEach(row => {
        const pid  = parseInt(row.querySelector('.po-product').value);
        const qty  = parseInt(row.querySelector('.po-qty').value);
        const cost = parseFloat(row.querySelector('.po-cost').value);
        if (pid && qty > 0 && cost >= 0) items.push({ product_id: pid, quantity_ordered: qty, unit_cost: cost });
      });

      const errEl = document.getElementById('poError');
      if (!supplier_id || !branch_id) {
        errEl.textContent = 'Select supplier and branch.';
        errEl.classList.remove('hidden');
        return;
      }
      if (items.length === 0) {
        errEl.textContent = 'Add at least one item.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        await API.post('/api/purchase-orders', { supplier_id, branch_id, items });
        showToast('Purchase order placed!');
        closePoModal();
        const orders = await API.get('/api/purchase-orders');
        renderOrders(orders);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    }

    async function receivePo(id) {
      try {
        await API.patch(`/api/purchase-orders/${id}/receive`);
        showToast('PO marked as received. Inventory updated!');
        const orders = await API.get('/api/purchase-orders');
        renderOrders(orders);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    init();
  </script>
</body>
</html>

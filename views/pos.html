<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS — Sales & Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-slate-100 min-h-screen flex">

  <aside class="w-60 bg-slate-800 min-h-screen flex-shrink-0 hidden md:block" id="sidebar"></aside>

  <div class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-4">
      <h1 class="text-lg font-semibold text-slate-800">Point of Sale</h1>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden">

      <!-- Left: Product Search -->
      <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b border-slate-100">
          <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Search products by name or SKU…"
              class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
            <select id="catFilter"
              class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
              <option value="">All Categories</option>
            </select>
          </div>
        </div>
        <div id="productGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
      </div>

      <!-- Right: Cart -->
      <div class="w-80 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex-shrink-0">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between">
          <h2 class="font-semibold text-slate-700">Cart</h2>
          <button id="clearCart" class="text-xs text-red-500 hover:underline">Clear</button>
        </div>

        <!-- Customer name -->
        <div class="px-4 pt-3">
          <input id="customerName" type="text" placeholder="Customer name (optional)"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>

        <!-- Cart items -->
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

        <!-- Totals -->
        <div class="p-4 border-t border-slate-100 space-y-2 text-sm">
          <div class="flex justify-between text-slate-600">
            <span>Subtotal</span><span id="cartSubtotal">$0.00</span>
          </div>
          <div class="flex items-center gap-2 text-slate-600">
            <span>Discount</span>
            <input id="discountInput" type="number" min="0" max="100" value="0"
              class="w-16 border border-slate-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-emerald-500 ml-auto" />
            <span class="text-xs">%</span>
          </div>
          <div class="flex justify-between font-semibold text-slate-800 text-base pt-1 border-t border-slate-200">
            <span>Total</span><span id="cartTotal">$0.00</span>
          </div>
          <button id="checkoutBtn"
            class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed">
            Checkout
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- Receipt Modal -->
  <div id="receiptModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full max-h-screen overflow-y-auto">
      <div class="p-6 no-print">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold text-slate-800">Receipt</h3>
          <div class="flex gap-2">
            <button onclick="window.print()"
              class="bg-slate-700 hover:bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg">🖨️ Print</button>
            <button id="closeReceipt" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
          </div>
        </div>
      </div>
      <div id="receipt-printable" class="px-6 pb-6 font-mono text-xs"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let products = [];
    let cart = {}; // { productId: { product, quantity } }

    async function init() {
      await initLayout();
      const [prods, cats] = await Promise.all([
        API.get('/api/products'),
        API.get('/api/products/categories'),
      ]);
      products = prods;

      // Populate category filter
      const catSel = document.getElementById('catFilter');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        catSel.appendChild(opt);
      });

      renderProducts();

      document.getElementById('searchInput').addEventListener('input', renderProducts);
      document.getElementById('catFilter').addEventListener('change', renderProducts);
      document.getElementById('discountInput').addEventListener('input', renderCartTotals);
      document.getElementById('clearCart').addEventListener('click', () => { cart = {}; renderCart(); });
      document.getElementById('checkoutBtn').addEventListener('click', checkout);
      document.getElementById('closeReceipt').addEventListener('click', () => {
        document.getElementById('receiptModal').classList.add('hidden');
        cart = {};
        renderCart();
        document.getElementById('customerName').value = '';
        document.getElementById('discountInput').value = 0;
      });
    }

    function renderProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const catId  = document.getElementById('catFilter').value;
      const grid   = document.getElementById('productGrid');

      const filtered = products.filter(p =>
        (!search || p.name.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search)) &&
        (!catId  || p.category_id == catId)
      );

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center text-slate-400 text-sm py-8">No products found.</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <button onclick="addToCart(${p.id})"
          class="border border-slate-200 rounded-xl p-3 text-left hover:border-emerald-400 hover:shadow-md transition-all group">
          <p class="text-xs text-slate-400 mb-1">${p.category_name}</p>
          <p class="text-sm font-semibold text-slate-700 leading-tight group-hover:text-emerald-700">${p.name}</p>
          <p class="text-xs text-slate-400 mt-1">${p.sku}</p>
          <p class="text-sm font-bold text-emerald-600 mt-2">${fmt(p.unit_price)}</p>
          <p class="text-xs text-slate-400">${p.unit_of_measure}</p>
        </button>
      `).join('');
    }

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      if (cart[productId]) {
        cart[productId].quantity++;
      } else {
        cart[productId] = { product, quantity: 1 };
      }
      renderCart();
      showToast(`Added: ${product.name}`);
    }

    function renderCart() {
      const el = document.getElementById('cartItems');
      const entries = Object.values(cart);

      if (entries.length === 0) {
        el.innerHTML = '<p class="text-slate-400 text-sm text-center py-6">Cart is empty</p>';
        renderCartTotals();
        return;
      }

      el.innerHTML = entries.map(({ product, quantity }) => `
        <div class="cart-row flex items-center gap-2 py-2 border-b border-slate-100">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-slate-700 truncate">${product.name}</p>
            <p class="text-xs text-slate-400">${fmt(product.unit_price)} ea</p>
          </div>
          <div class="flex items-center gap-1">
            <button onclick="changeQty(${product.id}, -1)"
              class="w-6 h-6 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 text-xs font-bold">−</button>
            <span class="w-7 text-center text-sm font-semibold">${quantity}</span>
            <button onclick="changeQty(${product.id}, 1)"
              class="w-6 h-6 bg-slate-100 hover:bg-slate-200 rounded text-slate-600 text-xs font-bold">+</button>
          </div>
          <span class="text-sm font-semibold text-emerald-700 w-14 text-right">${fmt(product.unit_price * quantity)}</span>
        </div>
      `).join('');

      renderCartTotals();
    }

    function changeQty(productId, delta) {
      if (!cart[productId]) return;
      cart[productId].quantity += delta;
      if (cart[productId].quantity <= 0) delete cart[productId];
      renderCart();
    }

    function renderCartTotals() {
      const entries = Object.values(cart);
      const subtotal = entries.reduce((s, { product, quantity }) => s + product.unit_price * quantity, 0);
      const discount = Math.min(parseFloat(document.getElementById('discountInput').value) || 0, 100);
      const discAmt  = subtotal * discount / 100;
      const total    = subtotal - discAmt;

      document.getElementById('cartSubtotal').textContent = fmt(subtotal);
      document.getElementById('cartTotal').textContent    = fmt(total);
      document.getElementById('checkoutBtn').disabled     = entries.length === 0;
    }

    async function checkout() {
      const entries = Object.values(cart);
      if (entries.length === 0) return;

      const discount_percent = parseFloat(document.getElementById('discountInput').value) || 0;
      const customer_name    = document.getElementById('customerName').value.trim() || null;

      const btn = document.getElementById('checkoutBtn');
      btn.disabled = true;
      btn.textContent = 'Processing…';

      try {
        const sale = await API.post('/api/sales', {
          items: entries.map(({ product, quantity }) => ({ product_id: product.id, quantity })),
          discount_percent,
          customer_name,
        });
        showReceipt(sale);
        showToast('Sale completed!');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Checkout';
      }
    }

    function showReceipt(sale) {
      const lines = sale.items.map(i =>
        `<tr>
          <td style="padding:2px 0">${i.product_name}</td>
          <td style="text-align:right">${i.quantity}</td>
          <td style="text-align:right">${fmt(i.unit_price)}</td>
          <td style="text-align:right">${fmt(i.subtotal)}</td>
        </tr>`
      ).join('');

      document.getElementById('receipt-printable').innerHTML = `
        <div style="text-align:center;margin-bottom:12px">
          <strong style="font-size:14px">SALES RECEIPT</strong><br/>
          <span>${sale.branch_name || ''}</span><br/>
          <span style="font-size:10px">${new Date(sale.created_at).toLocaleString()}</span><br/>
          <span style="font-size:10px">Receipt #${sale.id}</span>
        </div>
        ${sale.customer_name ? `<div>Customer: ${sale.customer_name}</div><br/>` : ''}
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid #000">
              <th style="text-align:left;padding:2px 0">Item</th>
              <th style="text-align:right">Qty</th>
              <th style="text-align:right">Price</th>
              <th style="text-align:right">Sub</th>
            </tr>
          </thead>
          <tbody>${lines}</tbody>
        </table>
        <div style="border-top:1px solid #000;margin-top:8px;padding-top:6px">
          <div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>${fmt(sale.subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between"><span>Discount</span><span>-${fmt(sale.discount_amount)}</span></div>
          <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:14px;margin-top:4px">
            <span>TOTAL</span><span>${fmt(sale.total_amount)}</span>
          </div>
        </div>
        <div style="text-align:center;margin-top:12px;font-size:10px">
          Thank you for your purchase!
        </div>
      `;

      document.getElementById('receiptModal').classList.remove('hidden');
    }

    init();
  </script>
</body>
</html>
